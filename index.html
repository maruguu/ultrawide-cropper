<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>おびとりくん</title>

<style>
body{
    font-family:sans-serif;
    padding:30px;
}

canvas{
    border:1px solid #ccc;
    margin:10px;
}

/* 表示サイズを縮小 */
.preview{
    max-width:600px;
    width:100%;
    height:auto;
}

.container{
    display:flex;
    gap:40px;
}

.drop{
    border:2px dashed #888;
    padding:40px;
    margin-bottom:20px;
}

.info{
    text-align:left;
    display:inline-block;
    margin:20px;
    padding:10px;
    border:1px solid #ccc;
}
</style>

</head>
<body>

<h1>おびとりくん</h1>

<div class="drop" id="drop">
画像をドラッグ＆ドロップ<br>
または
<br>
<input type="file" id="fileInput">
</div>

<div class="container">

<div>
<h3>処理前</h3>
<div class="info" id="inputInfo"></div><br>
<canvas id="inputCanvas" class="preview"></canvas>
</div>

<div>
<h3>処理後</h3>
<div class="info" id="outputInfo"></div><br>
<canvas id="outputCanvas" class="preview"></canvas>
<br>
<button id="download">Download</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
