<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Ultrawide Screenshot Cropper</title>

<style>
body{
    font-family:sans-serif;
    text-align:center;
    padding:40px;
}

canvas{
    max-width:100%;
    border:1px solid #ccc;
}

.info{
    text-align:left;
    display:inline-block;
    margin:20px;
    padding:10px;
    border:1px solid #ccc;
}
</style>
</head>

<body>

<h1>Ultrawide Screenshot Cropper</h1>

<input type="file" id="fileInput">

<div class="info">
<h3>入力画像</h3>
<div id="inputInfo"></div>
</div>

<div class="info">
<h3>処理後画像</h3>
<div id="outputInfo"></div>
</div>

<br>

<canvas id="canvas"></canvas>

<br><br>
<button id="download">Download</button>

<script src="script.js"></script>

</body>
</html>
